version: '3.4'

services:
  redis:
    image: redis:latest
    container_name: new-api-redis
    restart: always
    ports:
      - "6380:6379"

  mysql:
    image: mysql:8.2
    container_name: new-api-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: new-api
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mysql_data:
